        function editEvent(id, e) {
            if (e) e.stopPropagation();
            const event = events.find(ev => ev.id === id);
            if (!event) return;

            editingId = id;
            document.getElementById('modalTitle').textContent = '编辑日程';
            document.getElementById('deleteBtn').style.display = 'block';
            document.getElementById('eventTitle').value = event.title;
            document.getElementById('eventDesc').value = event.description || '';
            if (event.start) {
                document.getElementById('eventStartDate').value = event.start.slice(0, 10);
                document.getElementById('eventStartTime').value = event.start.slice(11, 16);
            } else {
                document.getElementById('eventStartDate').value = '';
                document.getElementById('eventStartTime').value = '';
            }
            if (event.end) {
                document.getElementById('eventEndDate').value = event.end.slice(0, 10);
                document.getElementById('eventEndTime').value = event.end.slice(11, 16);
            } else {
                document.getElementById('eventEndDate').value = '';
                document.getElementById('eventEndTime').value = '';
            }
            document.getElementById('eventReminder').value = String(event.reminder || 0);

            // Load repeat settings
            document.getElementById('eventRepeat').value = event.repeat || 'none';
            onRepeatChange();
            if (event.repeatDays) {
                document.querySelectorAll('#customRepeatDays input[type="checkbox"]').forEach(cb => {
                    cb.checked = event.repeatDays.includes(parseInt(cb.value));
                });
            }

            renderColorPicker(event.color);
            document.getElementById('eventModal').classList.add('active');
        }

        function onRepeatChange() {
            const repeat = document.getElementById('eventRepeat').value;
            document.getElementById('customRepeatDays').style.display = repeat === 'custom' ? 'block' : 'none';
        }

        function renderColorPicker(selectedColor) {
            const picker = document.getElementById('colorPicker');
            picker.innerHTML = COLORS.map(c => `
                <div class="color-opt${c === (selectedColor || COLORS[0]) ? ' selected' : ''}"
                    style="background:${c}" onclick="selectColor('${c}')"></div>
            `).join('');
            picker.dataset.selected = selectedColor || COLORS[0];
        }

        function selectColor(c) {
            document.querySelectorAll('.color-opt').forEach(el => {
                el.classList.toggle('selected', el.style.background === c);
            });
            document.getElementById('colorPicker').dataset.selected = c;
        }

        function closeModal() {
            document.getElementById('eventModal').classList.remove('active');
        }

        async function saveEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            if (!title) { alert('请输入标题'); return; }

            const startDate = document.getElementById('eventStartDate').value;
            const startTime = document.getElementById('eventStartTime').value;
            const endDate = document.getElementById('eventEndDate').value;
            const endTime = document.getElementById('eventEndTime').value;

            const repeat = document.getElementById('eventRepeat').value;
            const repeatDays = repeat === 'custom'
                ? Array.from(document.querySelectorAll('#customRepeatDays input[type="checkbox"]:checked')).map(cb => parseInt(cb.value))
                : [];

            const event = {
                title,
                description: document.getElementById('eventDesc').value,
                color: document.getElementById('colorPicker').dataset.selected,
                start: startDate && startTime ? `${startDate}T${startTime}` : '',
                end: endDate && endTime ? `${endDate}T${endTime}` : '',
                reminder: parseInt(document.getElementById('eventReminder').value),
                repeat,
                repeatDays
            };

            try {
                if (editingId) {
                    await fetch(API + '/events/' + editingId, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(event)
                    });
                } else {
                    await fetch(API + '/events', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(event)
                    });
                }
                await loadEvents();
                closeModal();
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }

        async function deleteEvent() {
            if (!editingId) return;
            if (!confirm('确定删除这个日程？')) return;
            try {
                await fetch(API + '/events/' + editingId, { method: 'DELETE' });
                await loadEvents();
                closeModal();
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }

        // Expand repeat events to all occurrences in the current month view
        function expandRepeatEvents(dateStr) {
            const [year, month, day] = dateStr.split('-').map(Number);
            const date = new Date(year, month - 1, day);
            // Reset to midnight for proper date comparison
            date.setHours(0, 0, 0, 0);
            const dayOfWeek = date.getDay();

            const expanded = [];
            events.forEach(event => {
                if (!event.start) return;

                const eventDate = event.start.split('T')[0];
                const [ey, em, ed] = eventDate.split('-').map(Number);
                const eventStartDate = new Date(ey, em - 1, ed);
                eventStartDate.setHours(0, 0, 0, 0);

                // Check if event repeats and should show on this date
                let shouldShow = false;

                if (!event.repeat || event.repeat === 'none') {
                    // No repeat - show only on start date
                    shouldShow = eventDate === dateStr;
                } else if (event.repeat === 'daily') {
                    // Every day
                    shouldShow = date >= eventStartDate;
                } else if (event.repeat === 'weekly') {
                    // Same day of week each week
                    shouldShow = date >= eventStartDate && date.getDay() === eventStartDate.getDay();
                } else if (event.repeat === 'monthly') {
                    // Same day of month
                    shouldShow = date >= eventStartDate && ed === day;
                } else if (event.repeat === 'yearly') {
                    // Same month and day
                    shouldShow = date >= eventStartDate && em === month && ed === day;
                } else if (event.repeat === 'custom' && event.repeatDays && event.repeatDays.length > 0) {
                    // Custom days of week
                    shouldShow = date >= eventStartDate && event.repeatDays.includes(dayOfWeek);
                }

                if (shouldShow) {
                    expanded.push(event);
                }
            });
            return expanded;
        }

        loadEvents();
        loadTodos();
        loadNotes();
        connectWebSocket();
        setInterval(loadEvents, 30000); // Refresh every 30s

        // Close image modal with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeImageModal();
            }
        });

        <button class="image-modal-nav image-modal-prev" onclick="navigateImage(-1, event)">&#10094;</button>
        <button class="image-modal-nav image-modal-next" onclick="navigateImage(1, event)">&#10095;</button>
        <div class="image-modal-counter" id="imageModalCounter"></div>
    </div>
</body>
</html>
